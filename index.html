<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Health Checker</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 50px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 400px; text-align: center; }
        textarea { width: 100%; height: 100px; margin: 10px 0; padding: 10px; box-sizing: border-box; border-radius: 8px; border: 1px solid #ddd; }
        button { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 18px; font-weight: bold; }
        #response { margin-top: 20px; background: #f9f9f9; padding: 15px; border-radius: 10px; text-align: left; display: none; white-space: pre-wrap; border-left: 5px solid #007bff; }
    </style>
</head>
<body>

<div class="card">
    <h1>AI Health Check</h1>
    <textarea id="userInput" placeholder="Describe your symptoms (e.g., I have a headache and feel dizzy)..."></textarea>
    <button id="myBtn" onclick="askAI()">Analyze Symptoms</button>
    <div id="response"></div>
    <p style="font-size: 10px; color: grey; margin-top: 15px;">DISCLAIMER: This is an AI tool. Not medical advice. Call emergency services for urgent issues.</p>
</div>

<script>
async function askAI() {
    const input = document.getElementById('userInput').value;
    const responseDiv = document.getElementById('response');
    const btn = document.getElementById('myBtn');

    if (!input.trim()) {
        alert("Please type your symptoms first!");
        return;
    }

    // Fixed: Added quotes around the API key
    const GEMINI_API_KEY = 'AIzaSyBVjErp0PcSntyosHi71_WoiE5k6pStuDw'; 

    btn.innerText = "Processing...";
    btn.disabled = true;
    responseDiv.style.display = "block";
    responseDiv.innerText = "Connecting to Google AI...";

    try {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`;
        
        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{ parts: [{ text: "Analyze these symptoms briefly: " + input }] }]
            })
        });

        const data = await response.json();

        if (data.error) {
            alert("Google Error: " + data.error.message);
            responseDiv.innerText = "Error: " + data.error.message;
        } else {
            responseDiv.innerText = data.candidates[0].content.parts[0].text;
        }

    } catch (err) {
        alert("Connection Error: " + err.message);
        responseDiv.innerText = "Fatal Error: " + err.message;
    } finally {
        btn.innerText = "Analyze Symptoms";
        btn.disabled = false;
    }
}
</script>

</body>
</html>
