<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Health Checker</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; }
        h1 { color: #2d3436; margin-bottom: 5px; }
        p { color: #636e72; margin-bottom: 20px; }
        textarea { width: 100%; height: 100px; padding: 15px; border: 1.5px solid #ddd; border-radius: 12px; font-size: 16px; box-sizing: border-box; resize: none; outline: none; transition: 0.3s; }
        textarea:focus { border-color: #0984e3; }
        button { width: 100%; padding: 15px; background: #0984e3; color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        #response { margin-top: 25px; text-align: left; background: #f8f9fa; padding: 20px; border-radius: 12px; border-left: 5px solid #0984e3; white-space: pre-wrap; display: none; }
        .disclaimer { font-size: 11px; color: #b2bec3; margin-top: 25px; line-height: 1.4; }
    </style>
</head>
<body>

<div class="card">
    <h1>AI Health Check</h1>
    <p>How are you feeling today?</p>
    <textarea id="userInput" placeholder="Describe symptoms (e.g., I have a sharp stomach pain and feel nauseous...)"></textarea>
    <button id="btn" onclick="askAI()">Analyze Symptoms</button>
    <div id="response"></div>
    <div class="disclaimer">🚨 <b>Disclaimer:</b> This is an AI tool for information only. Not a medical diagnosis. For emergencies, call 911 or visit the ER immediately.</div>
</div>

<script>
async function askAI() {
    const input = document.getElementById('userInput').value;
    const responseDiv = document.getElementById('response');
    const btn = document.getElementById('btn');

    if (!input.trim()) return alert("Please type something!");

    // --- PASTE YOUR API KEY HERE ---
    const GEMINI_API_KEY = AIzaSyBVjErp0PcSntyosHi71_WoiE5k6pStuDw; 

    responseDiv.style.display = "block";
    responseDiv.innerText = "Analyzing your symptoms... please wait.";
    btn.disabled = true;

    try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{
                    parts: [{
                        text: `You are a medical symptom checker assistant. A user says: "${input}". 
                        Please provide: 
                        1. Potential Causes (list 2-3). 
                        2. Triage Advice (Home care, Clinic, or Emergency Room). 
                        3. Red Flags to watch out for.
                        Always start with a professional medical disclaimer.`
                    }]
                }]
            })
        });

        const data = await response.json();
        const aiText = data.candidates[0].content.parts[0].text;
        responseDiv.innerText = aiText;

    } catch (error) {
        responseDiv.innerText = "Error: Could not reach the AI. Check your API key or connection.";
        console.error(error);
    } finally {
        btn.disabled = false;
    }
}
</script>

</body>
</html>
