<!DOCTYPE html>
<html>
<head>
  <title>MediScan AI</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 40px;
      background: #f0f8ff;
    }
    input, button {
      padding: 10px;
      margin: 10px;
      width: 250px;
    }
    button {
      background: #007bff;
      color: white;
      border: none;
    }
  </style>
</head>
<body>

  <h1>🩺 MediScan AI</h1>

  <input id="symptom" placeholder="Enter symptoms">
  <br>
  <button onclick="check()">Check</button>

  <h3 id="result"></h3>

  <script>
    function check() {
      let symptom = document.getElementById("symptom").value.toLowerCase();
      let result = "";

      if (symptom.includes("fever")) {
        result = "Possible: Viral Fever / Flu\nRisk: Medium\nAdvice: Rest and hydrate";
      } 
      else if (symptom.includes("chest pain")) {
        result = "Possible: Heart Issue\nRisk: HIGH ⚠️\nAdvice: Seek immediate medical help";
      } 
      else if (symptom.includes("headache")) {
        result = "Possible: Migraine / Stress\nRisk: Low\nAdvice: Rest and reduce screen time";
      } 
      else {
        result = "Unable to detect. Please consult a doctor.";
      }

      document.getElementById("result").innerText = result;
    }
  </script>

  <p style="margin-top:20px;font-size:12px;">
    ⚠️ This is not a medical diagnosis. Consult a doctor.
  </p>

</body>
</html>
