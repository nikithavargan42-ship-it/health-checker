<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Symptom Assistant</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f4f8; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; border-top: 8px solid #0984e3; }
        h1 { color: #2d3436; margin-bottom: 10px; }
        textarea { width: 100%; height: 120px; padding: 15px; border: 2px solid #dfe6e9; border-radius: 12px; font-size: 16px; box-sizing: border-box; resize: none; outline: none; transition: 0.3s; margin-bottom: 15px; }
        textarea:focus { border-color: #0984e3; }
        button { width: 100%; padding: 15px; background: #0984e3; color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #074b83; }
        button:disabled { background: #b2bec3; }
        #response { margin-top: 25px; text-align: left; background: #f8f9fa; padding: 20px; border-radius: 12px; border-left: 5px solid #0984e3; white-space: pre-wrap; display: none; line-height: 1.6; color: #2d3436; font-size: 15px; }
        .disclaimer { font-size: 11px; color: #b2bec3; margin-top: 25px; line-height: 1.4; }
    </style>
</head>
<body>

<div class="card">
    <h1>AI Symptom Checker</h1>
    <p>Describe how you are feeling today:</p>
    <textarea id="userInput" placeholder="Example: I have a mild headache and my eyes feel dry after working on my computer..."></textarea>
    <button id="btn" onclick="askAI()">Analyze Symptoms</button>
    <div id="response"></div>
    <div class="disclaimer">🚨 <b>NOT MEDICAL ADVICE:</b> This is an AI tool. If you have chest pain, shortness of breath, or a severe emergency, call 911 immediately.</div>
</div>

<script>
async function askAI() {
    const input = document.getElementById('userInput').value.trim();
    const responseDiv = document.getElementById('response');
    const btn = document.getElementById('btn');

    if (!input) {
        alert("Please describe your symptoms first.");
        return;
    }

    // Your Key is already here
    const KEY = 'AIzaSyBVjErp0PcSntyosHi71_WoiE5k6pStuDw'; 
    
    // We use v1beta because it is the most stable for the Flash model
    const URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`;

    btn.innerText = "Analyzing Symptoms...";
    btn.disabled = true;
    responseDiv.style.display = "block";
    responseDiv.innerText = "Connecting to Google AI...";

    try {
        const res = await fetch(URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{
                    parts: [{
                        text: "You are a medical triage assistant. Analyze these symptoms and provide 3 sections: Possible Causes, When to see a doctor, and Red Flags. Symptoms: " + input
                    }]
                }]
            })
        });

        if (!res.ok) {
            const errData = await res.json();
            throw new Error(errData.error ? errData.error.message : "Connection failed");
        }

        const data = await res.json();
        
        if (data.candidates && data.candidates[0].content.parts[0].text) {
            responseDiv.innerText = data.candidates[0].content.parts[0].text;
        } else {
            responseDiv.innerText = "The AI is currently busy. Please try again in 10 seconds.";
        }

    } catch (err) {
        responseDiv.innerText = "Technical Error: " + err.message + ". Make sure your API key is correct in Google AI Studio.";
        console.error(err);
    } finally {
        btn.innerText = "Analyze Symptoms";
        btn.disabled = false;
    }
}
</script>

</body>
</html>
